name: Renovate

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.6
        with:
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
